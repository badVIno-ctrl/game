<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS ARENA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;color:#e0e0e0;user-select:none}
body{background:linear-gradient(160deg,#0a0c10 0%,#121820 40%,#0e1218 100%);display:flex;flex-direction:column;align-items:center;justify-content:center}

/* subtle animated grain */
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");
  mix-blend-mode:overlay}

h1{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(90deg,#ff6040,#ffc060,#ff6040);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(255,120,60,.25);margin-bottom:8px}
.subtitle{font-size:14px;color:#667;letter-spacing:3px;margin-bottom:48px;text-transform:uppercase}

.cards{display:flex;gap:32px;flex-wrap:wrap;justify-content:center}

.card{
  width:280px;height:340px;border-radius:16px;cursor:pointer;position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(25,30,40,.9),rgba(15,18,24,.95));
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .25s,box-shadow .25s,border-color .25s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center
}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.6);border-color:rgba(255,255,255,.12)}
.card:active{transform:translateY(-2px)}

.card-icon{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 0 12px rgba(255,255,255,.15))}
.card h2{font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.card p{font-size:13px;color:#889;line-height:1.5}

.card.bots{--accent:#4a9eff}
.card.bots:hover{border-color:var(--accent);box-shadow:0 16px 48px rgba(74,158,255,.15)}
.card.bots .card-icon{color:var(--accent)}
.card.bots h2{color:var(--accent)}

.card.online{--accent:#ff6040}
.card.online:hover{border-color:var(--accent);box-shadow:0 16px 48px rgba(255,96,64,.15)}
.card.online .card-icon{color:var(--accent)}
.card.online h2{color:var(--accent)}

/* Lobby overlay */
#lobby{display:none;position:fixed;inset:0;background:rgba(6,8,12,.95);z-index:100;
  flex-direction:column;align-items:center;justify-content:center;gap:20px}
#lobby.active{display:flex}

#lobby h2{font-size:28px;font-weight:700;letter-spacing:3px;color:#ff6040;margin-bottom:12px}

.lobby-box{
  width:360px;max-width:90vw;background:rgba(20,24,32,.95);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:28px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 12px 40px rgba(0,0,0,.5)
}
.lobby-box label{font-size:13px;color:#8899aa;letter-spacing:1px;text-transform:uppercase}
.lobby-box input{
  width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;
  background:rgba(10,12,18,.8);color:#e0e0e0;font-size:16px;outline:none;
  transition:border-color .2s
}
.lobby-box input:focus{border-color:#ff6040}
.lobby-box button{
  padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:background .2s,transform .1s;text-transform:uppercase
}
.lobby-box button:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#ff6040,#ff8060);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#ff7050,#ff9070)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:rgba(255,255,255,.06);color:#aab;border:1px solid rgba(255,255,255,.08)!important}
.btn-secondary:hover{background:rgba(255,255,255,.1)}

#lobby-status{font-size:14px;color:#8899aa;text-align:center;min-height:20px}
#lobby-error{font-size:13px;color:#ff5040;text-align:center;min-height:18px}

.step{display:none}
.step.active{display:flex;flex-direction:column;gap:16px}

/* spinner */
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:#ff6040;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.back-btn{position:absolute;top:20px;left:20px;background:none;border:1px solid rgba(255,255,255,.1);
  color:#889;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;letter-spacing:1px}
.back-btn:hover{border-color:rgba(255,255,255,.2);color:#bbc}
</style>
</head>
<body>

<h1>FPS ARENA</h1>
<div class="subtitle">выбери режим игры</div>

<div class="cards">
  <div class="card bots" onclick="location.href='/game'">
    <div class="card-icon">🎯</div>
    <h2>ИГРА С БОТАМИ</h2>
    <p>Сражайся с 60 ботами на большой карте. Захвати флаг на вражеской базе.</p>
  </div>
  <div class="card online" onclick="openLobby()">
    <div class="card-icon">⚔️</div>
    <h2>ОНЛАЙН PVP</h2>
    <p>1 на 1 с другом. Найди противника по нику и сражайтесь на арене.</p>
  </div>
</div>

<!-- Lobby overlay -->
<div id="lobby">
  <button class="back-btn" onclick="closeLobby()">← НАЗАД</button>
  <h2>ОНЛАЙН АРЕНА</h2>

  <!-- Step 1: Enter nickname -->
  <div class="lobby-box step active" id="step-nick">
    <label>Введите ваш никнейм</label>
    <input type="text" id="input-nick" placeholder="Ваш ник..." maxlength="24" autocomplete="off">
    <div id="lobby-error"></div>
    <button class="btn-primary" id="btn-register" onclick="doRegister()">ВОЙТИ</button>
  </div>

  <!-- Step 2: Find opponent -->
  <div class="lobby-box step" id="step-find">
    <label>Вы: <span id="my-nick" style="color:#ff6040;font-weight:700"></span></label>
    <label style="margin-top:8px">С кем хотите играть?</label>
    <input type="text" id="input-target" placeholder="Ник противника..." maxlength="24" autocomplete="off">
    <div id="lobby-error2"></div>
    <button class="btn-primary" id="btn-find" onclick="doFind()">НАЙТИ ИГРОКА</button>
    <div id="lobby-status"></div>
  </div>

  <!-- Step 3: Connecting -->
  <div class="lobby-box step" id="step-connect">
    <div style="text-align:center">
      <div class="spinner"></div>
      <p style="margin-top:16px;color:#aab" id="connect-msg">Подключение...</p>
    </div>
  </div>
</div>

<script>
let ws = null;
let myNickname = '';

function openLobby() {
  document.getElementById('lobby').classList.add('active');
  connectWS();
}

function closeLobby() {
  document.getElementById('lobby').classList.remove('active');
  if (ws) { ws.close(); ws = null; }
  showStep('step-nick');
}

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {};
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
  ws.onclose = () => {
    // Try reconnect after 2s if lobby is open
    if (document.getElementById('lobby').classList.contains('active')) {
      setTimeout(connectWS, 2000);
    }
  };
}

function handleMessage(msg) {
  if (msg.type === 'registered') {
    myNickname = msg.nickname;
    document.getElementById('my-nick').textContent = myNickname;
    showStep('step-find');
    document.getElementById('input-target').focus();
  }
  else if (msg.type === 'error') {
    const e1 = document.getElementById('lobby-error');
    const e2 = document.getElementById('lobby-error2');
    if (document.getElementById('step-nick').classList.contains('active')) {
      e1.textContent = msg.msg;
    } else {
      e2.textContent = msg.msg;
    }
  }
  else if (msg.type === 'not_found') {
    document.getElementById('lobby-error2').textContent =
      'Игрок "' + msg.target + '" не найден. Убедитесь, что он онлайн.';
    document.getElementById('btn-find').disabled = false;
    document.getElementById('btn-find').textContent = 'НАЙТИ ИГРОКА';
  }
  else if (msg.type === 'matched') {
    showStep('step-connect');
    document.getElementById('connect-msg').textContent =
      'Противник найден: ' + msg.opponent + '. Загрузка...';
    // Redirect to game
    setTimeout(() => {
      const params = new URLSearchParams({
        mode: 'pvp',
        room: msg.room,
        nickname: myNickname,
        spawn: String(msg.spawn),
        opponent: msg.opponent
      });
      location.href = '/game?' + params.toString();
    }, 800);
  }
}

function doRegister() {
  const nick = document.getElementById('input-nick').value.trim();
  document.getElementById('lobby-error').textContent = '';
  if (!nick) {
    document.getElementById('lobby-error').textContent = 'Введите никнейм';
    return;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    document.getElementById('lobby-error').textContent = 'Нет соединения с сервером';
    connectWS();
    return;
  }
  ws.send(JSON.stringify({ type: 'register', nickname: nick }));
}

function doFind() {
  const target = document.getElementById('input-target').value.trim();
  document.getElementById('lobby-error2').textContent = '';
  if (!target) {
    document.getElementById('lobby-error2').textContent = 'Введите ник противника';
    return;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    document.getElementById('lobby-error2').textContent = 'Нет соединения с сервером';
    return;
  }
  document.getElementById('btn-find').disabled = true;
  document.getElementById('btn-find').textContent = 'ПОИСК...';
  ws.send(JSON.stringify({ type: 'find', target: target }));
}

// Enter key handling
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('step-nick').classList.contains('active')) doRegister();
    else if (document.getElementById('step-find').classList.contains('active')) doFind();
  }
});
</script>
</body>
</html>
